name: Rotate Adobe refresh token

# Weekly (Friday 21:00 PST = Saturday 05:00 UTC), plus manual runs from the Actions tab.
#
# This does NOT protect against the live app rotating the token on its own
# between runs (see scripts/rotate_adobe_token.py's header for why). If a
# run fails with invalid_grant, that's what happened -- the fix is to re-run
# the one-time OAuth consent flow via /oauth/start and update the secrets by
# hand once, then this job resumes covering things going forward.
on:
  schedule:
    - cron: "0 5 * * 6"
  workflow_dispatch:

concurrency:
  group: rotate-adobe-token
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vercel CLI
        run: npm install --global vercel

      # Pulls the *current* value straight from Vercel (decrypted), so the
      # refresh call below always uses whatever is actually live in
      # production rather than a potentially stale GitHub secret.
      - name: Pull current env from Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel env pull .vercel-current.env \
            --environment=production \
            --token="$VERCEL_TOKEN" \
            --yes

      - name: Refresh token with Adobe & update Vercel
        id: rotate
        env:
          ADOBE_CLIENT_ID: ${{ secrets.ADOBE_CLIENT_ID }}
          ADOBE_CLIENT_SECRET: ${{ secrets.ADOBE_CLIENT_SECRET }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: python scripts/rotate_adobe_token.py

      # Mask the new token immediately, before it's referenced anywhere else,
      # so it never shows up in plaintext in the logs.
      - name: Mask new token
        if: steps.rotate.outputs.rotated == 'true'
        run: echo "::add-mask::${{ steps.rotate.outputs.new_token }}"

      # Keep the GitHub secret in sync too, so the manual
      # sync-secrets-and-deploy workflow (or the next run of this one)
      # doesn't clobber Vercel with a stale value later.
      # Requires a PAT with permission to manage Actions secrets -- the
      # default GITHUB_TOKEN can't do this.
      - name: Update GitHub secret
        if: steps.rotate.outputs.rotated == 'true'
        env:
          GH_TOKEN: ${{ secrets.SECRETS_ADMIN_TOKEN }}
          NEW_TOKEN: ${{ steps.rotate.outputs.new_token }}
        run: gh secret set ADOBE_REFRESH_TOKEN --body "$NEW_TOKEN" --repo "${{ github.repository }}"

      - name: Deploy to Vercel (production)
        id: deploy
        if: steps.rotate.outputs.rotated == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          DEPLOYMENT_URL=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          echo "Deployed to $DEPLOYMENT_URL"
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Verify deployment health
        if: steps.rotate.outputs.rotated == 'true'
        run: |
          set -euo pipefail
          URL="https://frameio-sheets-webhook.vercel.app"
          echo "Checking $URL"
          for attempt in 1 2 3 4 5; do
            http_code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
            if [ "$http_code" = "200" ] && grep -q '"status"[[:space:]]*:[[:space:]]*"ok"' /tmp/health.json; then
              echo "Health check passed: $(cat /tmp/health.json)"
              exit 0
            fi
            echo "Attempt $attempt: http $http_code, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1